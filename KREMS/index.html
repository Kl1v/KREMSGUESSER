<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KREMSGUESSER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <div style="display: flex; flex-direction: row;">
                    <p style="color: #FFCC00;">KREMS</p>
                    <p style="color: black;">GUESSER</p>
                </div>
            </div>
            <div class="upgrade-btn">UPGRADE ZU PREMIUM</div>
        </div>
        <div class="main-content">
            <div class="sidebar">
                <div class="menu-item">EINZELSPIELER</div>
                <div class="menu-item">MEHRSPIELER</div>
                <div class="menu-item light">SHOP<span style="background-color: #ff4646; font-size: 12px; padding: 2px 4px; border-radius: 4px;">NEU</span></div>
            </div>
            <div class="center-content">
                <div class="globe-wrapper">
                    <img src="GlobeKrems.png" alt="Globe" class="globe-image">
                </div>
                <div class="globe-shadow"></div>
                <button class="new-trip-btn">SPIELEN</button>
                <div class="black-screen"></div>
            </div>
            <div class="right-sidebar">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto"></ins>
                <script>
                    (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
                <div class="user-actions">
                    <img src="/placeholder.svg?height=24&width=24" alt="Search" class="icon">
                    <div class="shop-btn">
                        <img src="/placeholder.svg?height=24&width=24" alt="Shop" class="icon">
                        SHOP
                    </div>
                    <div class="notification">!</div>
                    <img src="/placeholder.svg?height=40&width=40" alt="User avatar" class="user-avatar">
                </div>
                <div class="user-info">
                    <div class="user-name">
                        USERNAME
                        <img src="/placeholder.svg?height=16&width=16" alt="Dropdown" class="icon">
                    </div>
                    <div class="user-level">LVL XY</div>
                    <div class="level-bar"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
